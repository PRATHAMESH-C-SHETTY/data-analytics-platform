{% extends 'base.html' %}
{% block title %}Login · DataLens{% endblock %}
{% block extra_head %}
<style>
.auth-wrap { display:flex; justify-content:center; align-items:center; min-height:72vh; padding:2rem 0; }
.auth-card { width:100%; max-width:420px; }
.auth-logo { width:52px;height:52px;background:linear-gradient(135deg,var(--indigo),var(--cyan));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin:0 auto 1.25rem;box-shadow:0 0 30px rgba(99,102,241,.4); }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:1.75rem">
      <div class="auth-logo">⚡</div>
      <h2 style="font-weight:800;font-size:1.5rem;letter-spacing:-.03em;margin-bottom:.35rem">Welcome back</h2>
      <p class="text-muted text-sm">Sign in to your DataLens account to access your datasets and reports.</p>
    </div>

    <div class="card">
      <form method="POST" action="/login">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary w-full" style="justify-content:center;padding:.7rem;font-size:.95rem;margin-top:.5rem">
          Sign In <i class="bi bi-arrow-right"></i>
        </button>
      </form>
    </div>

    <p style="text-align:center;margin-top:1rem;font-size:.875rem;color:var(--text3)">
      Don't have an account?
      <a href="/signup" style="color:var(--indigo);font-weight:600">Sign Up</a>
    </p>
    <p style="text-align:center;margin-top:.5rem">
      <a href="/" class="text-muted text-sm"><i class="bi bi-arrow-left"></i> Continue without account</a>
    </p>
  </div>
</div>
{% endblock %}
